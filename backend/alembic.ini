# Alembic configuration file.

[alembic]
# Path to migration scripts (relative to this file).
script_location = alembic

# Placeholder – overridden by env.py at runtime from app.config.settings.
sqlalchemy.url = postgresql+asyncpg://user:password@localhost:5432/filmlist

# Template for migration file names.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Truncate long revision slugs.
truncate_slug_length = 40

# Timezone for file_template date tokens (defaults to UTC).
# timezone =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
